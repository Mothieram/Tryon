data:
  root: "./dataset"
  train_pairs: "train_pairs.txt"
  test_pairs: "test_pairs.txt"
  val_pairs: "val_pairs.txt"            # auto-generated by prepare_data
  val_split: 0.1
  resolution: [256, 192]                # [H, W] — phase 1
  high_resolution: [512, 384]           # phase 2
  num_workers: 4
  # VITON-HD subdirectory names
  subdirs:
    image: "image"
    cloth: "cloth"
    cloth_mask: "cloth-mask"
    agnostic: "agnostic-v3.2"
    densepose: "image-densepose"
    parse: "image-parse-v3"
    parse_agnostic: "image-parse-agnostic-v3.2"
    openpose_json: "openpose_json"

augmentation:
  horizontal_flip: true
  # Color jitter is cloth-only and adds noise to the white background of the cloth
  # photo without paired noise on the target — disabled until the baseline is
  # stable. Re-enable (e.g. brightness/contrast/saturation 0.1) once GMM converges.
  color_jitter:
    brightness: 0.0
    contrast: 0.0
    saturation: 0.0
    hue: 0.0
  # random_affine is applied only to the cloth (not the person), forcing the warp
  # to undo the affine PLUS find the body shape. Disabled for the initial
  # baseline; re-enable once GMM is converging cleanly.
  random_affine:
    enabled: false
    angle: 10
    translate: [0.05, 0.05]
    scale: [0.9, 1.1]

model:
  person_rep_channels: 30        # 3 + 3 + 20 + 4
  cloth_input_channels: 7        # 3 + 1 + 3
  num_parse_classes: 20
  encoder_features: [64, 128, 256, 512]
  coarse_grid: 5                 # 5x5 = 25 control points
  fine_grid: 10                  # 10x10 = 100 control points
  regression_dropout: 0.1

discriminator:
  in_channels: 6                 # composed(3) + person(3)
  features: [64, 128, 256, 512]

training:
  stage: "gmm"                   # gmm | refinement | joint
  batch_size: 8
  gmm_epochs: 60
  refine_epochs: 40
  joint_epochs: 15
  seed: 42
  device: "cuda"

  optimizer:
    type: "adam"
    lr: 1.0e-4
    betas: [0.5, 0.999]
    weight_decay: 0.0

  discriminator_optimizer:
    lr: 2.0e-4
    betas: [0.5, 0.999]

  scheduler:
    warmup_epochs: 2
    warmup_start_factor: 0.01
    eta_min: 1.0e-6

  amp:
    enabled: true

  gradient_clip:
    max_norm: 1.0

  reg_warmup:
    start_weight: 0.1
    final_weight: 0.03           # was 0.01 — keep mild TPS smoothness throughout to prevent grid folding
    warmup_epochs: 20            # was 10 — slower decay so the warp doesn't go wild before learning structure

  progressive_resolution:
    switch_after_plateau: true
    patience: 5
    high_res_lr_factor: 0.1

losses:
  gmm:
    coarse_l1: 0.5
    coarse_perceptual: 0.5       # was 0.05 — push perceptual signal so LPIPS metric tracks
    fine_l1: 1.0
    fine_perceptual: 1.0         # was 0.1 — primary perceptual term, now matches L1 weight
    mask: 0.3                    # was 0.1 — encourage warped_mask to fit target_mask
    edge: 0.1
    grid_smoothness: 0.05

  refinement:
    l1: 1.0
    perceptual: 0.1
    comp_mask_bce: 0.1
    edge: 0.05
    gan: 0.1

  perceptual:
    vgg_layers: ["relu1_2", "relu2_2", "relu3_3", "relu4_3"]
    normalize_input: true

validation:
  interval: 2
  save_top_k: 3
  early_stopping_patience: 10
  metrics: ["lpips", "ssim", "l1"]
  primary_metric: "lpips"
  primary_metric_mode: "min"

logging:
  backend: "tensorboard"
  log_dir: "./runs"
  ckpt_dir: "./checkpoints"
  image_log_interval: 500
  log_tps_grid: true
  log_individual_losses: true
